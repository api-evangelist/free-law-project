          type: object
          value: $.
    - name: citation-lookup
      path: /citation-lookup/
      operations:
      - name: lookupcitations
        method: POST
        description: Lookup citations in text
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts
      path: /alerts/
      operations:

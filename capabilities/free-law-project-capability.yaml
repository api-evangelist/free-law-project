        method: POST
        description: Create an alert
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tag
      path: /tag/
      operations:
      - name: listtags
        method: GET
        description: List tags
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.

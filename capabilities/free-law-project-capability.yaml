naftiko: 1.0.0-alpha2
info:
  label: Free Law Project / CourtListener REST API
  description: The CourtListener REST API (operated by Free Law Project) provides programmatic access to case law, PACER data,
    the RECAP archive, oral arguments, judges, financial disclosures, citations, citation networks, alerts, tags, and visualizations.
  tags:
  - Free
  - Law
  - Project
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: free-law-project
    baseUri: https://www.courtlistener.com/api/rest/v4
    description: Free Law Project / CourtListener REST API HTTP API.
    authentication:
      type: apikey
      in: header
      name: Authorization
      value: '{{FREE_LAW_PROJECT_TOKEN}}'
    resources:
    - name: search
      path: /search/
      operations:
      - name: search
        method: GET
        description: Search across CourtListener
        inputParameters:
        - name: q
          in: query
          type: string
          description: Search query string.
        - name: type
          in: query
          type: string
          description: Result type (e.g., o for opinions, r for RECAP, oa for oral arguments, p for people).
        - name: order_by
          in: query
          type: string
        - name: page
          in: query
          type: integer
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: opinions
      path: /opinions/
      operations:
      - name: listopinions
        method: GET
        description: List opinions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: opinions-id
      path: /opinions/{id}/
      operations:
      - name: getopinion
        method: GET
        description: Retrieve an opinion
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: clusters
      path: /clusters/
      operations:
      - name: listclusters
        method: GET
        description: List opinion clusters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: dockets
      path: /dockets/
      operations:
      - name: listdockets
        method: GET
        description: List dockets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: docket-entries
      path: /docket-entries/
      operations:
      - name: listdocketentries
        method: GET
        description: List docket entries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: recap-documents
      path: /recap-documents/
      operations:
      - name: listrecapdocuments
        method: GET
        description: List RECAP documents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: audio
      path: /audio/
      operations:
      - name: listoralarguments
        method: GET
        description: List oral arguments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: people
